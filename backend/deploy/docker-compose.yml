services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      - PORT=8000
      - NODE_ENV=production
    ports:
      - "8000:8000"

  ai_service:
    build:
      context: ./ai_service
    volumes:
      - ../components/AIModel/python/model:/model:ro
    environment:
      - PYTHON_MODEL_PATH=/model/heat_advisory_model.joblib
    ports:
      - "8001:8001"

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - ai_service
